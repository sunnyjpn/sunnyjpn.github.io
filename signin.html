<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunny にサインイン</title>
<style>
  :root{
    --bg:#111111;
    --panel:#1a1a1a;
    --border:#2c2c2c;
    --blue:#2B87D1;
    --blue-hover:#3a95de;
    --text:#f5f5f5;
    --text-dim:#9a9a9a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:"Hiragino Sans","Yu Gothic","Segoe UI",sans-serif;
    display:flex;
    min-height:100vh;
  }
  .left{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:60px 40px;
    position:relative;
  }
  .logo{
    position:absolute;
    top:40px;
    left:48px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .logo img{
    width:28px;
    height:28px;
  }
  .logo span{
    font-size:19px;
    font-weight:700;
    letter-spacing:0.02em;
  }
  .hero{
    text-align:center;
    margin-bottom:40px;
  }
  .hero h1{
    font-size:52px;
    font-weight:400;
    line-height:1.25;
    margin:0 0 20px;
    letter-spacing:0.02em;
  }
  .hero p{
    color:var(--text-dim);
    font-size:15px;
    margin:0;
    letter-spacing:0.02em;
  }
  .card{
    width:100%;
    max-width:420px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:32px;
  }
  .btn-google{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:transparent;
    border:1px solid var(--border);
    color:var(--text);
    border-radius:10px;
    padding:13px;
    font-size:14px;
    cursor:pointer;
    transition:background .15s;
  }
  .btn-google:hover{background:#242424;}
  .divider{
    text-align:center;
    color:var(--text-dim);
    font-size:12px;
    margin:18px 0;
  }
  input[type="email"]{
    width:100%;
    background:#242424;
    border:1px solid var(--border);
    border-radius:10px;
    padding:13px 14px;
    color:var(--text);
    font-size:14px;
    margin-bottom:14px;
  }
  input[type="email"]::placeholder{color:#777;}
  .btn-primary{
    width:100%;
    background:var(--blue);
    border:none;
    color:#fff;
    border-radius:10px;
    padding:13px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s;
  }
  .btn-primary:hover{background:var(--blue-hover);}
  .fine-print{
    font-size:11.5px;
    color:var(--text-dim);
    text-align:center;
    margin-top:14px;
    line-height:1.6;
  }
  .fine-print a{
    color:var(--text-dim);
    text-decoration:underline;
  }
  .right{
    flex:1;
    padding:24px 24px 24px 0;
    display:flex;
  }
  .promo{
    width:100%;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    background:linear-gradient(135deg,#2B87D1 0%,#1c5f96 100%);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .promo::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255,255,255,0.06) 0%, transparent 40%);
  }
  .promo-content{
    position:relative;
    text-align:center;
    padding:40px;
  }
  .promo-content img{
    width:96px;
    height:96px;
    margin-bottom:24px;
  }
  .promo-content h2{
    font-size:34px;
    font-weight:800;
    margin:0 0 12px;
    color:#fff;
  }
  .promo-content p{
    font-size:16px;
    color:rgba(255,255,255,0.85);
    margin:0;
    line-height:1.7;
  }
  @media (max-width:900px){
    .right{display:none;}
    .left{padding:100px 24px 40px;}
    .hero h1{font-size:38px;}
  }
</style>
</head>
<body>

  <div class="left">
    <div class="logo">
      <img src="icon-192.png" alt="Sunny">
      <span>Reaction Time Test</span>
    </div>

    <div class="hero">
      <h1>Sunny</h1>
      <p>今すぐ、自分の反応速度を試そう</p>
    </div>

    <div class="card">
      <button class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.08-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33C2.44 15.98 5.48 18 9 18z"/><path fill="#FBBC05" d="M3.97 10.72c-.18-.54-.28-1.12-.28-1.72s.1-1.18.28-1.72V4.95H.96A8.996 8.996 0 000 9c0 1.45.35 2.83.96 4.05l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.59-2.59C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Googleで続ける
      </button>
      <div class="divider">または</div>
      <input type="email" placeholder="メールアドレスを入力">
      <button class="btn-primary">メールで続ける</button>
      <div class="fine-print">
        続行することで、Sunny JPNの<a href="https://www.anthropic.com/legal/archive/21d66aa9-68f6-4356-ba01-2825b0f81805" target="_blank" rel="noopener">プライバシーポリシー</a>に同意したものとみなされます。
      </div>
    </div>
  </div>

  <div class="right">
    <div class="promo">
      <div class="promo-content">
        <img src="icon-192.png" alt="Reaction Time Test">
        <h2>Reaction Time Test</h2>
        <p>緑になったらすぐタップ。<br>あなたの瞬発力を今すぐ測定。</p>
      </div>
    </div>
  </div>

</body>
</html>
